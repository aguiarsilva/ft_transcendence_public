global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    cluster: 'ft_transcendence'
    environment: 'production'

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "backend"
    static_configs:
      - targets: ["app:3001"]
    metrics_path: '/metrics'
    scheme: 'https'
    tls_config:
      insecure_skip_verify: true

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
